name: Atualizar Dashboard

on:
  push:
    branches: [main]           # Roda a cada push na main
  schedule:
    - cron: '0 */6 * * *'      # Roda automaticamente a cada 6 horas
  workflow_dispatch:           # Permite rodar manualmente pela aba Actions

jobs:
  gerar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas openpyxl requests

      - name: Gerar index.html
        run: python gerar_dashboard.py

      - name: Publicar index.html atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📊 Dashboard atualizado automaticamente"
          git push
