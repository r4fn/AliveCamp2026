name: Atualizar Dashboard

on:
  push:
    paths:
      - 'dados/123.xlsx'   # Dispara só quando a planilha mudar

jobs:
  gerar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas openpyxl

      - name: Gerar index.html
        run: python gerar_dashboard.py

      - name: Publicar index.html atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📊 Dashboard atualizado automaticamente"
          git push
